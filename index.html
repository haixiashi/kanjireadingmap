*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic Pro","Yu Gothic","Meiryo",sans-serif;background:#fff}
.wrap{overflow:auto;width:100vw;height:100vh;scrollbar-width:none;cursor:grab;user-select:none}
.wrap::-webkit-scrollbar{display:none}
.wrap.dragging{cursor:grabbing}
table{border-collapse:collapse}
td{border:1px solid #ccc;padding:2px 4px;background:#fff;vertical-align:top;font-size:10px;width:128px;min-width:128px;height:128px;overflow:hidden;position:relative;contain:strict}
td.e{background:#eee}
td.few ruby,.kg.lg ruby{font-size:26px}
td.few rt,.kg.lg rt{font-size:11px}

.first-col .watermark{font-size:72px}
.kg{display:inline-block;margin:1px 2px;white-space:nowrap;padding:1px 2px;border-radius:3px;color:#999}
ruby{font-size:12px}
rt{font-size:6px;color:#888}
.more{display:none}
.more.open{display:inline}
.toggle{cursor:pointer;color:#37d;font-size:10px;margin-left:3px;user-select:none;white-space:nowrap}
.toggle:hover{text-decoration:underline}
.j6{color:#373}
.j5{color:#693}
.j4{color:#fa2}
.j3{color:#e50}
.j2{color:#b22}
.j1{color:#000}
.gb{border-left:2.5px solid #555}

.gr{border-right:2.5px solid #555}
.gbb{border-bottom:2.5px solid #555}
.minimap{position:fixed;bottom:16px;right:16px;background:#fff;border:1px solid #999;border-radius:4px;z-index:10;cursor:crosshair}
.minimap-vp{position:absolute;border:2px solid #37d;background:rgba(59,125,216,0.15);border-radius:1px;pointer-events:none}
.fixed-btn{position:fixed;bottom:16px;z-index:10;height:44px;border-radius:6px;border:1px solid #999;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;transition:background 0.2s,border-color 0.2s}
.fixed-btn:hover{background:#ccc}
.theme-toggle{right:170px;width:44px;font-size:24px}
.reading-toggle{right:222px;width:44px;font-size:22px;font-weight:bold}
body.kun-only .kg.on{display:none}
body.on-only .kg.kun{display:none}
body.dark{background:#222}
body.dark td{background:#222;border-color:#444;color:#ddd}

body.dark .watermark{color:#666}
body.dark .kg{color:#888}
body.dark rt{color:#999}
body.dark .toggle{color:#59f}
body.dark .j6{color:#6b6}

body.dark .gt{border-top-color:#999}
body.dark .gr{border-right-color:#999}
body.dark .gbb{border-bottom-color:#999}
body.dark .minimap{background:#222;border-color:#666}
body.dark .fixed-btn{background:#222;border-color:#666;color:#ddd}
body.dark .fixed-btn:hover{background:#444}

</style>
