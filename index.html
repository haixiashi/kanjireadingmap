*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic Pro","Yu Gothic","Meiryo",sans-serif;

.wrap{overflow:auto;width:100vw;height:100vh;
      scrollbar-width:none;cursor:grab;user-select:none}
.wrap::-webkit-scrollbar{display:none}
.wrap.dragging{cursor:grabbing}
table{border-collapse:collapse}
td{border:1px solid #ccc;padding:3px 5px}
td{background:#fff;vertical-align:top;font-size:13px;
   width:120px;min-width:120px;height:120px;overflow:hidden;
   position:relative}
td.e{background:#f0f0f0}
td.few ruby{font-size:32px}
td.few rt{font-size:14px}
.kg.lg ruby{font-size:32px}
.kg.lg rt{font-size:14px}
td.first-col{border-right:3px solid #000;width:240px;min-width:240px}
.watermark{position:absolute;top:0;left:0;width:100%;height:100%;
           pointer-events:none;display:flex;align-items:center;justify-content:center;
           font-size:48px;font-family:sans-serif;color:#999;opacity:0.18;font-weight:bold}
.first-col .watermark{font-size:90px}
.kg{display:inline-block;margin:1px 2px;white-space:nowrap;
    padding:1px 2px;border-radius:3px;color:#999}
ruby{font-size:15px}
rt{font-size:8px;color:#888}
.more{display:none}
.more.open{display:inline}
.toggle{cursor:pointer;color:#3b7dd8;font-size:12px;margin-left:4px;
        user-select:none;white-space:nowrap}
.toggle:hover{text-decoration:underline}
.j6{color:#1b5e20}
.j5{color:#2e7d32}
.j4{color:#1565c0}
.j3{color:#6a1b9a}
.j2{color:#e65100}
.j1{color:#b71c1c}
.gb{border-left:2.5px solid #555}
.gt{border-top:2.5px solid #555}
.minimap{position:fixed;bottom:16px;right:16px;
         background:rgba(255,255,255,0.85);border:1px solid #999;border-radius:4px;
         z-index:10;backdrop-filter:blur(4px);cursor:crosshair}
.minimap-vp{position:absolute;border:2px solid #3b7dd8;background:rgba(59,125,216,0.15);
            border-radius:1px;pointer-events:none}
.theme-toggle{position:fixed;bottom:16px;right:170px;z-index:10;
              width:32px;height:32px;border-radius:4px;border:1px solid #999;
              background:rgba(255,255,255,0.85);backdrop-filter:blur(4px);
              cursor:pointer;display:flex;align-items:center;justify-content:center;
              font-size:18px;line-height:1;padding:0;transition:background 0.2s,border-color 0.2s}
.theme-toggle:hover{background:rgba(200,200,200,0.85)}

body.dark{background:#1a1a1a}
body.dark td{background:#2a2a2a;border-color:#444;color:#ddd}
body.dark td.e{background:#222}
body.dark td.first-col{border-right-color:#aaa}
body.dark .watermark{color:#666}
body.dark .kg{color:#888}
body.dark rt{color:#999}
body.dark .toggle{color:#5b9df8}

body.dark .theme-toggle{background:rgba(30,30,30,0.85);border-color:#666;color:#ddd}
body.dark .theme-toggle:hover{background:rgba(60,60,60,0.85)}

"ん":["4湾ワン", "4腕ワン", "3碗ワン", "3椀ワン"],
"し":["4鷲わし"],
"ひ":["3詫わび"]
}
}
};

generateTable(kanjiData);
initializeInteractivity();

function generateTable(data) {
  const headers = ['', ...data.kana];
  const rows = [...data.kana].slice(0, -1);
  const tableData = data.data;
  const colBorders = [0, 6, 11, 16, 21, 26, 31, 36, 39, 44];
  const rowBorders = [0, 5, 10, 15, 20, 25, 30, 35, 38, 43];
  const tbody = document.getElementById('tablebody');

  rows.forEach((rowLabel, rowIdx) => {
    const tr = document.createElement('tr');
    headers.forEach((colLabel, colIdx) => {
      const td = document.createElement('td');
      if (colIdx === 0) td.classList.add('first-col');
      if (colBorders.includes(colIdx)) td.classList.add('gb');
      if (rowBorders.includes(rowIdx)) td.classList.add('gt');

      const entries = tableData[rowLabel][colLabel] || [];
      if (entries.length === 0) {
        td.classList.add('e');
      } else if (entries.length <= 2) {
        td.classList.add('few');
      }
      if (entries.length > 0) {
        const showCount = colIdx === 0 ? 15 : 6;
        entries.slice(0, showCount).forEach((e, i) => {
          const span = createKanjiSpan(e);
          if (entries.length > 2 && i < 1) span.classList.add('lg');
          td.appendChild(span);
        });

        if (entries.length > showCount) {
          const more = document.createElement('span');
          more.className = 'more';
          entries.slice(showCount).forEach(e => more.appendChild(createKanjiSpan(e)));
          td.appendChild(more);
          const toggle = document.createElement('span');
          toggle.className = 'toggle';
          toggle.textContent = '+' + (entries.length - showCount);
          toggle.onclick = function(ev) { ev.stopPropagation(); toggleMore(this); };
          td.appendChild(toggle);
        }
      }

      const wm = rowLabel + colLabel;
      if (wm) {
        const d = document.createElement('div');
        d.className = 'watermark';
        d.textContent = wm;
        td.appendChild(d);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function createKanjiSpan(str) {
  const lvl = str.charCodeAt(0) - 48;
  const p = str.substring(2).split('|');
  const span = document.createElement('span');
  span.className = 'kg';
  if (lvl > 0) span.classList.add('j' + lvl);

  const ruby = document.createElement('ruby');
  ruby.textContent = str[1];
  const rt = document.createElement('rt');
  rt.textContent = p[0];
  ruby.appendChild(rt);

  span.appendChild(ruby);
  if (p[1]) {
    span.appendChild(document.createTextNode(p[1]));
  }

  return span;
}

function toggleMore(el) {
  const more = el.previousElementSibling;
  if (more && more.classList.contains('more')) {
    const count = more.children.length;
    more.classList.toggle('open');
    el.textContent = more.classList.contains('open') ? '−' + count : '+' + count;
  }
}

function initializeInteractivity() {
  const w = document.querySelector('.wrap');
  const table = document.getElementById('kanjitable');
  const mm = document.createElement('div');
  mm.className = 'minimap';
  document.body.appendChild(mm);

  const vp = document.createElement('div');
  vp.className = 'minimap-vp';
  mm.appendChild(vp);

  const themeBtn = document.createElement('button');
  themeBtn.className = 'theme-toggle';
  themeBtn.textContent = '\u263E';
  themeBtn.title = 'Toggle dark mode';
  document.body.appendChild(themeBtn);
  if (localStorage.getItem('dark') === '1') document.body.classList.add('dark');
  if (document.body.classList.contains('dark')) themeBtn.textContent = '\u2600';
  themeBtn.addEventListener('click', function() {
    document.body.classList.toggle('dark');
    const dark = document.body.classList.contains('dark');
    themeBtn.textContent = dark ? '\u2600' : '\u263E';
    localStorage.setItem('dark', dark ? '1' : '0');
  });
  const MM_MAX = 140, MINIMAP_PAD = MM_MAX + 32;
  let lastX = 0, lastY = 0, isDragging = false, mmDrag = false;
  let minimapUpdateScheduled = false, scale = 1;
  let vx = 0, vy = 0, lastTime = 0, inertiaId = 0;

  const sizeWrap = document.createElement('div');
  sizeWrap.style.position = 'relative';
  table.parentNode.insertBefore(sizeWrap, table);
  sizeWrap.appendChild(table);
  table.style.position = 'absolute';
  table.style.top = '0';
  table.style.left = '0';
  table.style.transformOrigin = '0 0';

  function applyScale() {
    table.style.transform = `scale(${scale})`;
    sizeWrap.style.width = table.offsetWidth * scale + 'px';
    sizeWrap.style.height = table.offsetHeight * scale + MINIMAP_PAD + 'px';
  }
  applyScale();

  function scheduleMinimapUpdate() {
    if (!minimapUpdateScheduled) {
      minimapUpdateScheduled = true;
      requestAnimationFrame(() => {
        updateMinimap();
        minimapUpdateScheduled = false;
      });
    }
  }

  function startDrag(x, y) {
    cancelAnimationFrame(inertiaId);
    isDragging = true;
    lastX = x; lastY = y;
    vx = 0; vy = 0;
    lastTime = performance.now();
    w.classList.add('dragging');
  }

  function moveDrag(x, y) {
    const now = performance.now();
    const dt = now - lastTime || 1;
    const dx = x - lastX;
    const dy = y - lastY;
    vx = dx / dt * 16;
    vy = dy / dt * 16;
    w.scrollLeft -= dx;
    w.scrollTop -= dy;
    lastX = x; lastY = y;
    lastTime = now;
  }

  function endDrag() {
    isDragging = false;
    w.classList.remove('dragging');
    function coast() {
      if (Math.abs(vx) < 0.5 && Math.abs(vy) < 0.5) return;
      w.scrollLeft -= vx;
      w.scrollTop -= vy;
      vx *= 0.95;
      vy *= 0.95;
      scheduleMinimapUpdate();
      inertiaId = requestAnimationFrame(coast);
    }
    inertiaId = requestAnimationFrame(coast);
  }

  w.addEventListener('mousedown', function(e) {
    startDrag(e.clientX, e.clientY);
  });

  document.addEventListener('mousemove', function(e) {
    if (isDragging) moveDrag(e.clientX, e.clientY);
    if (mmDrag) mmNav(e);
  });

  document.addEventListener('mouseup', function() {
    if (isDragging) endDrag();
    mmDrag = false;
  });

  w.addEventListener('wheel', function(e) {
    e.preventDefault();
    const rect = w.getBoundingClientRect();
    const mx = e.clientX - rect.left + w.scrollLeft;
    const my = e.clientY - rect.top + w.scrollTop;
    const prev = scale;
    scale *= e.deltaY > 0 ? 0.9 : 1/0.9;
    scale = Math.max(0.3, Math.min(3, scale));
    applyScale();
    const r = scale / prev;
    w.scrollLeft = mx * r - (e.clientX - rect.left);
    w.scrollTop = my * r - (e.clientY - rect.top);
    scheduleMinimapUpdate();
  }, {passive: false});

  let touchState = null;
  w.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      const t0 = e.touches[0], t1 = e.touches[1];
      touchState = {
        dist: Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY),
        cx: (t0.clientX + t1.clientX) / 2,
        cy: (t0.clientY + t1.clientY) / 2,
        scale: scale
      };
    } else if (e.touches.length === 1) {
      cancelAnimationFrame(inertiaId);
      vx = 0; vy = 0;
      lastTime = performance.now();
      touchState = {drag: true, x: e.touches[0].clientX, y: e.touches[0].clientY};
    }
  }, {passive: false});

  w.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && touchState && !touchState.drag) {
      e.preventDefault();
      const t0 = e.touches[0], t1 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
      const cx = (t0.clientX + t1.clientX) / 2;
      const cy = (t0.clientY + t1.clientY) / 2;
      const rect = w.getBoundingClientRect();
      const mx = touchState.cx - rect.left + w.scrollLeft;
      const my = touchState.cy - rect.top + w.scrollTop;
      const prev = scale;
      scale = Math.max(0.3, Math.min(3, touchState.scale * (dist / touchState.dist)));
      applyScale();
      const r = scale / prev;
      w.scrollLeft = mx * r - (cx - rect.left);
      w.scrollTop = my * r - (cy - rect.top);
      touchState.cx = cx;
      touchState.cy = cy;
      touchState.dist = dist;
      touchState.scale = scale;
      scheduleMinimapUpdate();
    } else if (e.touches.length === 1 && touchState && touchState.drag) {
      e.preventDefault();
      const t = e.touches[0];
      const now = performance.now();
      const dt = now - lastTime || 1;
      const dx = t.clientX - touchState.x;
      const dy = t.clientY - touchState.y;
      vx = dx / dt * 16;
      vy = dy / dt * 16;
      w.scrollLeft -= dx;
      w.scrollTop -= dy;
      touchState.x = t.clientX;
      touchState.y = t.clientY;
      lastTime = now;
    }
  }, {passive: false});

  w.addEventListener('touchend', function(e) {
    if (touchState && touchState.drag && e.touches.length === 0) {
      function coast() {
        if (Math.abs(vx) < 0.5 && Math.abs(vy) < 0.5) return;
        w.scrollLeft -= vx;
        w.scrollTop -= vy;
        vx *= 0.95;
        vy *= 0.95;
        scheduleMinimapUpdate();
        inertiaId = requestAnimationFrame(coast);
      }
      inertiaId = requestAnimationFrame(coast);
    }
    touchState = null;
  });

  updateMinimap();
  w.addEventListener('scroll', scheduleMinimapUpdate);

  mm.addEventListener('mousedown', function(e) {
    e.preventDefault();
    e.stopPropagation();
    mmDrag = true;
    mmNav(e);
  });

  mm.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    mmDrag = true;
    mmNav(e.touches[0]);
  }, {passive: false});
  document.addEventListener('touchmove', function(e) {
    if (mmDrag) { e.preventDefault(); mmNav(e.touches[0]); }
  }, {passive: false});
  document.addEventListener('touchend', function() {
    mmDrag = false;
  });

  function updateMinimap() {
    const tw = w.scrollWidth;
    const th = w.scrollHeight;
    const vw = w.clientWidth;
    const vh = w.clientHeight;
    const r = Math.min(MM_MAX / tw, MM_MAX / th);
    const mmW = tw * r;
    const mmH = th * r;

    mm.style.width = mmW + 'px';
    mm.style.height = mmH + 'px';
    vp.style.left = w.scrollLeft * r + 'px';
    vp.style.top = w.scrollTop * r + 'px';
    vp.style.width = Math.min(vw, tw) * r + 'px';
    vp.style.height = Math.min(vh, th) * r + 'px';
  }

  function mmNav(e) {
    const rect = mm.getBoundingClientRect();
    const tw = w.scrollWidth;
    const th = w.scrollHeight;
    const r = Math.min(MM_MAX / tw, MM_MAX / th);
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    w.scrollLeft = cx / r - w.clientWidth / 2;
    w.scrollTop = cy / r - w.clientHeight / 2;
  }
}
</script>

</body>
</html>
