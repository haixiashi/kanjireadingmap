*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic Pro","Yu Gothic","Meiryo",sans-serif;

.wrap{overflow:auto;width:100vw;height:100vh;

table{border-collapse:collapse}

.kg.lg ruby{font-size:26px}
.kg.lg rt{font-size:11px}

ruby{font-size:12px}
rt{font-size:6px;color:#888}
.more{display:none}

.toggle{cursor:pointer;color:#3b7dd8;font-size:10px;margin-left:3px;

.j6{color:#2e7d32}
.j5{color:#689f38}
.j4{color:#f9a825}
.j3{color:#e65100}

.gb{border-left:2.5px solid #555}
.gt{border-top:2.5px solid #555}

.minimap-vp{position:absolute;border:2px solid #3b7dd8;background:rgba(59,125,216,0.15);

           height:44px;border-radius:6px;border:1px solid #999;
           background:#fff;

.fixed-btn:hover{background:#c8c8c8}
.theme-toggle{right:170px;width:44px;font-size:24px}
.reading-toggle{right:222px;width:44px;font-size:22px;font-weight:bold}
body.kun-only .kg.on{display:none}
body.on-only .kg.kun{display:none}
