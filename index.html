*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic Pro","Yu Gothic","Meiryo",sans-serif;

.wrap{overflow:auto;width:100vw;height:100vh;

.wrap::-webkit-scrollbar{display:none}
.wrap.dragging{cursor:grabbing}
table{border-collapse:collapse}
td{border:1px solid #ccc;padding:2px 4px}

td.e{background:#f0f0f0}

.kg.lg ruby{font-size:26px}
.kg.lg rt{font-size:11px}

.first-col .watermark{font-size:72px}
.kg{display:inline-block;margin:1px 2px;white-space:nowrap;

ruby{font-size:12px}
rt{font-size:6px;color:#888}
.more{display:none}
.more.open{display:inline}
.toggle{cursor:pointer;color:#3b7dd8;font-size:10px;margin-left:3px;

.toggle:hover{text-decoration:underline}
.j6{color:#2e7d32}
.j5{color:#689f38}
.j4{color:#f9a825}
.j3{color:#e65100}
.j2{color:#b71c1c}

.gb{border-left:2.5px solid #555}
.gt{border-top:2.5px solid #555}
.minimap{position:fixed;bottom:16px;right:16px;

         z-index:10;cursor:crosshair}
.minimap-vp{position:absolute;border:2px solid #3b7dd8;background:rgba(59,125,216,0.15);
            border-radius:1px;pointer-events:none}

           height:44px;border-radius:6px;border:1px solid #999;
           background:#fff;
           cursor:pointer;display:flex;align-items:center;justify-content:center;
           line-height:1;padding:0;transition:background 0.2s,border-color 0.2s}
.fixed-btn:hover{background:#c8c8c8}
.theme-toggle{right:170px;width:44px;font-size:24px}
.reading-toggle{right:222px;width:44px;font-size:22px;font-weight:bold}
body.kun-only .kg.on{display:none}
body.on-only .kg.kun{display:none}

body.dark{background:#1a1a1a}
body.dark td{background:#222;border-color:#444;color:#ddd}
body.dark td.e{background:#2a2a2a}
body.dark td.first-col{border-right-color:#aaa}

body.dark .fixed-btn{background:#1e1e1e;border-color:#666;color:#ddd}
